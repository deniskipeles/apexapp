name: Build Windows App (Cross-Compile)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: 'package-lock.json'

      # Cache Cargo registry to speed up build
      - name: Cache Rust
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
            src-tauri/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      # Cache the Windows SDK download (xwin) to save massive time
      - name: Cache XWin SDK
        id: cache-xwin
        uses: actions/cache@v4
        with:
          path: ./xwin
          key: ${{ runner.os }}-xwin-sdk

      - name: Run Setup and Build Script
        run: |
          chmod +x setup_and_build_win10_11.sh
          ./setup_and_build_win10_11.sh
        # NO PAT or GH_TOKEN injected here!

      - name: Upload Windows Installer
        uses: actions/upload-artifact@v4
        with:
          name: apexapp-windows-installer
          path: src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
          retention-days: 5